<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
    <!-- Light/Dark theme colors for browser UI -->
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0b0b0f" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="YoteCard — balances, transactions, and daily menu" />
    <!-- iOS PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="YoteCard" />
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/iconYotes.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "f74e4b72-cb35-4d8b-b3cb-62da7f996495",
          safari_web_id: "web.onesignal.auto.28be2e0f-48c0-43fd-877a-95cc3c6fc0d9",
          notifyButton: {
            enable: false,
          },
        });

        try {
          OneSignal.Notifications.addEventListener('permissionChange', async (e) => {
            try {
              console.log('[OneSignal] permissionChange event:', e);
              const permission = (typeof Notification !== 'undefined' && Notification.permission) ? Notification.permission : 'unknown';
              if (permission === 'granted') {
                try { await (navigator.serviceWorker && navigator.serviceWorker.ready); } catch (_) {}
                if (OneSignal?.Notifications?.isSubscribed) {
                  const already = await OneSignal.Notifications.isSubscribed();
                  if (!already && OneSignal?.Notifications?.subscribe) {
                    await OneSignal.Notifications.subscribe();
                    try { console.log('[OneSignal] Subscribed after permissionChange. User ID:', await OneSignal.User.getId()); } catch(_) { console.log('[OneSignal] Subscribed after permissionChange'); }
                  }
                }
              }
            } catch (err) {
              console.warn('[OneSignal] permissionChange handler error', err);
            }
          });
        } catch (e) {
          console.warn('[OneSignal] Failed to attach permissionChange listener', e);
        }
      });
    </script>
    <script>
      // Debug: log OneSignal user ID and permission after init
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      window.OneSignalDeferred.push(async function(OneSignal) {
        try {
          const userId = (OneSignal && OneSignal.User && OneSignal.User.getId)
            ? await OneSignal.User.getId()
            : undefined;
          const permission = (typeof Notification !== 'undefined' && Notification.permission)
            ? Notification.permission
            : 'unknown';
          let isSubscribed;
          if (OneSignal && OneSignal.Notifications && OneSignal.Notifications.isSubscribed) {
            try { isSubscribed = await OneSignal.Notifications.isSubscribed(); } catch (_) {}
          }
          console.log('[OneSignal] User ID:', userId);
          console.log('[OneSignal] Permission:', permission);
          if (typeof isSubscribed !== 'undefined') {
            console.log('[OneSignal] Is Subscribed:', isSubscribed);
          }
        } catch (e) {
          console.warn('[OneSignal] Debug logging failed:', e);
        }
      });
    </script>
    
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>YoteCard</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!-- Simple notifications permission popup -->
    <div id="notify-popup" style="display:none; position: fixed; inset: 0; z-index: 9999; align-items: center; justify-content: center; background: rgba(0,0,0,0.4);">
      <div style="max-width: 420px; width: calc(100% - 2rem); margin: 0 1rem; background: #111827; color: #f9fafb; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.35); overflow: hidden;">
        <div id="notify-title" style="padding: 16px 18px; border-bottom: 1px solid rgba(255,255,255,0.08); font-weight: 600;">Enable notifications</div>
        <div id="notify-body" style="padding: 16px 18px; line-height: 1.5; color: #e5e7eb;">
          Stay updated with balance changes, transactions, and menu updates. You can change this later in settings.
        </div>
        <div style="display:flex; gap: 10px; padding: 14px 18px; background: rgba(255,255,255,0.03); justify-content: flex-end;">
          <button id="notify-decline" style="appearance:none; border: 1px solid rgba(255,255,255,0.18); background: transparent; color: #e5e7eb; padding: 10px 14px; border-radius: 8px; cursor: pointer;">Maybe later</button>
          <button id="notify-accept" style="appearance:none; border: none; background: #4f46e5; color: white; padding: 10px 14px; border-radius: 8px; cursor: pointer; font-weight: 600;">Allow notifications</button>
        </div>
      </div>
    </div>
    <script>
      (function() {
        const storageKey = 'onesignal-notify-popup-dismissed';
        const popup = document.getElementById('notify-popup');
        const titleEl = document.getElementById('notify-title');
        const bodyEl = document.getElementById('notify-body');
        const acceptBtn = document.getElementById('notify-accept');
        const declineBtn = document.getElementById('notify-decline');

        function hidePopup() {
          if (popup) popup.style.display = 'none';
        }
        function showPopup() {
          if (popup) popup.style.display = 'flex';
        }

        function shouldShowPopup() {
          if (sessionStorage.getItem(storageKey) === '1') return false;
          const perm = (typeof Notification !== 'undefined' && Notification.permission) ? Notification.permission : 'default';
          return perm === 'default';
        }

        function wireHandlers(OneSignal) {
          if (!acceptBtn || !declineBtn) return;
          acceptBtn.onclick = async function() {
            try {
              if (OneSignal && OneSignal.Notifications && OneSignal.Notifications.requestPermission) {
                await OneSignal.Notifications.requestPermission();
                // After permission is granted, subscribe immediately
                try {
                  const permNow = (typeof Notification !== 'undefined' && Notification.permission) ? Notification.permission : 'default';
                  if (permNow === 'granted' && OneSignal.Notifications && OneSignal.Notifications.subscribe) {
                    try { await (navigator.serviceWorker && navigator.serviceWorker.ready); } catch (_) {}
                    await OneSignal.Notifications.subscribe();
                    try { console.log('[OneSignal] Subscribed immediately. User ID:', await OneSignal.User.getId()); } catch(_) { console.log('[OneSignal] Subscribed immediately after grant'); }
                  }
                } catch (_) {}
              } else if (typeof Notification !== 'undefined' && Notification.requestPermission) {
                await Notification.requestPermission();
              }
            } catch (e) {
              // no-op
            } finally {
              sessionStorage.setItem(storageKey, '1');
              hidePopup();
            }
          };
          declineBtn.onclick = function() {
            sessionStorage.setItem(storageKey, '1');
            hidePopup();
          };
        }

        // Wait for page load and OneSignal init
        window.addEventListener('load', function() {
          const isStandalone = (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) || window.navigator.standalone === true;
          const isIOS = /iPad|iPhone|iPod/i.test(navigator.userAgent);
          const perm = (typeof Notification !== 'undefined' && Notification.permission) ? Notification.permission : 'default';

          // Debug telemetry
          try {
            console.log('[PWA] display-mode standalone?', isStandalone);
            console.log('[PWA] iOS?', isIOS);
            console.log('[PWA] Notification.permission:', perm);
          } catch (_) {}

          // Only show our permission popup when running as installed PWA
          if (!isStandalone) return;
          if (!shouldShowPopup()) return;

          // If OneSignal v16 page SDK is present, wait on its deferred init
          if (window.OneSignalDeferred) {
            window.OneSignalDeferred.push(function(OneSignal) {
              // If already granted/denied, skip
              const p = (typeof Notification !== 'undefined' && Notification.permission) ? Notification.permission : 'default';
              if (p === 'default') {
                showPopup();
                wireHandlers(OneSignal);
              }
            });
          } else {
            // Fallback if SDK not yet loaded
            showPopup();
            wireHandlers(undefined);
          }
        });
      })();
    </script>

  </body>
</html>
