<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
    <!-- Light/Dark theme colors for browser UI -->
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0b0b0f" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="YoteCard — balances, transactions, and daily menu" />
    <!-- iOS PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="YoteCard" />
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/iconYotes.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700;9..144,800;9..144,900&family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@500&display=swap" rel="stylesheet">
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "f74e4b72-cb35-4d8b-b3cb-62da7f996495",
          safari_web_id: "web.onesignal.auto.28be2e0f-48c0-43fd-877a-95cc3c6fc0d9",
          notifyButton: {
            enable: false,
          },
          welcomeNotification: {
            disable: true,
          },
        });

        try {
          OneSignal.Notifications.addEventListener('permissionChange', async (e) => {
            try {
              console.log('[OneSignal] permissionChange event:', e);
              const permission = (typeof Notification !== 'undefined' && Notification.permission) ? Notification.permission : 'unknown';
              if (permission === 'granted') {
                try { await (navigator.serviceWorker && navigator.serviceWorker.ready); } catch (_) {}
                if (OneSignal?.Notifications?.isSubscribed) {
                  const already = await OneSignal.Notifications.isSubscribed();
                  if (!already && OneSignal?.Notifications?.subscribe) {
                    await OneSignal.Notifications.subscribe();
                    try { console.log('[OneSignal] Subscribed after permissionChange. User ID:', await OneSignal.User.getId()); } catch(_) { console.log('[OneSignal] Subscribed after permissionChange'); }
                  }
                }
              }
            } catch (err) {
              console.warn('[OneSignal] permissionChange handler error', err);
            }
          });
        } catch (e) {
          console.warn('[OneSignal] Failed to attach permissionChange listener', e);
        }
      });
    </script>
    <script>
      // Debug: log OneSignal user ID and permission after init
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      window.OneSignalDeferred.push(async function(OneSignal) {
        try {
          const userId = (OneSignal && OneSignal.User && OneSignal.User.getId)
            ? await OneSignal.User.getId()
            : undefined;
          const permission = (typeof Notification !== 'undefined' && Notification.permission)
            ? Notification.permission
            : 'unknown';
          let isSubscribed;
          if (OneSignal && OneSignal.Notifications && OneSignal.Notifications.isSubscribed) {
            try { isSubscribed = await OneSignal.Notifications.isSubscribed(); } catch (_) {}
          }
          console.log('[OneSignal] User ID:', userId);
          console.log('[OneSignal] Permission:', permission);
          if (typeof isSubscribed !== 'undefined') {
            console.log('[OneSignal] Is Subscribed:', isSubscribed);
          }
        } catch (e) {
          console.warn('[OneSignal] Debug logging failed:', e);
        }
      });
    </script>
    
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>YoteCard</title>
  </head>

    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

  </body>
</html>
